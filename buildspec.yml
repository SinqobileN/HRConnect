version: 0.2
 
phases:
  install:
    commands:
      - echo "Starting build process..."
 
  pre_build:
    commands:
      - echo "Validating project files..."
      - ls -l
      - test -f index.html || (echo "index.html not found!" && exit 1)
 
  build:
    commands:
      - echo "No build step required for static HTML site"
 
  post_build:
    commands:
      - echo "Build completed successfully"
 
artifacts:
  files:
    - '**/*'
  discard-paths: no
